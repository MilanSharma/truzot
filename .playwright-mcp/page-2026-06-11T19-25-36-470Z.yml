                - separator [ref=e284]
                - heading "Summary" [level=3] [ref=e285]
                - generic [ref=e286]:
                  - generic [ref=e287]:
                    - text: Zions Bancorporation's Enterprise Technology and Operations (ETO) team is transforming what it means to work for a financial institution. With a commitment to technology and innovation, we have been providing our community, clients and colleagues the best experience possible for over 150 years. Help us transform our workforce of the future, today.
                    - text: We are seeking a
                    - strong [ref=e288]: Senior CIAM
                    - strong [ref=e289]: Software Engineer
                    - text: in Salt Lake City to join our CIAM team to help support and enhance our Customer Identity and Access Management platform. CIAM is a critical system that provides identity and access management services for customer access to important business applications.
                    - text: The Engineering and Core Services organization is at the heart of innovation at Zions Bancorporation. We continually modernize on many of Zions' key banking applications and its banking core. In addition to application development, we manage the key platforms, services, and processes which enable modernized engineering and IT operations and delivery through DevOps and lean principles. Ensuring scalable, quality, innovative solutions for our teams and our customers is integral to what we do. Come join us in transforming engineering and banking software!
                    - text: This
                    - strong [ref=e290]: Software Engineer
                    - text: will be responsible for maintenance as well as development of new capabilities for managing customer identities and providing security and enhanced experience.
                    - text: The
                    - strong [ref=e291]: Software Engineer
                    - text: "will:"
                    - list [ref=e292]:
                      - listitem [ref=e293]: Provide support and maintenance of various systems.
                      - listitem [ref=e294]: Be responsible for technical analysis, application development, application configuration, incident response and resolution, troubleshooting, testing, source code management and executing and managing change processes.
                      - listitem [ref=e295]: Work as a member of Agile team, develop software solutions by studying requirements analysis and information needs; conferring with stakeholders and IT Management; studying systems flow, data usage, and work processes; perform software design using software development fundamentals and processes, debug, test, and deploy software solutions.
                      - listitem [ref=e296]: Review, analyze, evaluate business processes, procedures, systems and make recommendations for improvements and changes.
                      - listitem [ref=e297]: Manage source code version control system artifacts.
                      - listitem [ref=e298]: Work with Business Analysts to design technical requirements and perform application changes.
                      - listitem [ref=e299]: Conduct unit testing, provide input for feasibility, and prepare systems documentation.
                      - listitem [ref=e300]: Work On-Call Rotation and After-Hours that is required to support responsibilities.
                      - listitem [ref=e301]: Perform other duties as assigned.
                    - strong [ref=e302]: "Qualifications:"
                    - list [ref=e303]:
                      - listitem [ref=e304]: 6+ years experience with software and/or application development using multiple technologies, languages, databases, integrations, frameworks, systems, application development, testing and troubleshooting or other directly related experience.
                    - list [ref=e305]:
                      - listitem [ref=e306]: Extensive knowledge of Ping/ForgeRock, Java and Java programming tools, JavaScript, Groovy, Linux, Networking, SQL, Webservices/API, Secure Software Development Lifecycle, using application servers such as Tomcat, containers, cloud computing, SAML, SSO, OIDC/OAuth. Bash and yaml are nice to have.
                    - list [ref=e307]:
                      - listitem [ref=e308]: Work within an environment with changing technologies and priorities, along with effectively prioritizing and handling multiple concurrent projects
                      - listitem [ref=e309]: Ability to come up to speed quickly, utilize advanced software development skillsets, work independently and effectively in a team environment, and ultimately mentor and support those attempting to reach your level of expertise and beyond.
                      - listitem [ref=e310]:
                        - text: Bachelor's degree in Computer Science, Information Systems or a related field.
                        - list [ref=e311]:
                          - listitem [ref=e312]: Please consider applying even if you feel you don't meet 100% of the requirements
                    - text: A combination of education and experience may meet requirements.
                    - strong [ref=e313]: "Location:"
                    - text: This position has a hybrid work from home schedule with a minimum of three days per week in the office at the new Zions Technology Center in Midvale, UT.
                    - text: "The Zions Technology Center is a 400,000-square-foot technology campus in Midvale, Utah. Located on the former Sharon Steel Mill superfund site, the sustainably built campus will be the company's primary technology and operations center. This modern and environmentally friendly technology center will enable Zions to continue to compete for the best technology talent in the state while providing team members with an exceptional work environment with features such as:"
                    - list [ref=e314]:
                      - listitem [ref=e315]: Electric vehicle charging stations and close proximity to Historic Gardner Village UTA TRAX station.
                      - listitem [ref=e316]: At least 75% of the building is powered by on-site renewable solar energy.
                      - listitem [ref=e317]: Access to outdoor recreation, parks, trails, shareable bikes and locker rooms.
                      - listitem [ref=e318]: Large modern cafe with a healthy and diverse menu.
                      - listitem [ref=e319]: Healthy indoor environment with ample natural light and fresh air.
                      - listitem [ref=e320]: LEED-certified sustainable building that features include the use of low VOC-emitting construction materials.
                    - strong [ref=e321]: "Benefits:"
                    - list [ref=e322]:
                      - listitem [ref=e323]: Medical, Dental and Vision Insurance - START DAY ONE!
                      - listitem [ref=e324]: Life and Disability Insurance, Paid Parental Leave and Adoption Assistance
                      - listitem [ref=e325]: Health Savings (HSA), Flexible Spending (FSA) and dependent care accounts
                      - listitem [ref=e326]: Paid Training, Paid Time Off (PTO) and 11 Paid Federal Holidays
                      - listitem [ref=e327]: 401(k) plan with company match, Profit Sharing, competitive compensation in line with work experience
                      - listitem [ref=e328]: Mental health benefits including coaching and therapy sessions
                      - listitem [ref=e329]: Tuition Reimbursement for qualifying employees
                      - listitem [ref=e330]: Employee Ambassador preferred banking products
                    - strong [ref=e331]: Apply now if you have a passion for impactful outcomes, enjoy working collaboratively with co-workers, and want to make a difference for the clients and communities we serve.
