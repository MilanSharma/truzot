              - generic [ref=e342]:
                - generic [ref=e343]:
                  - paragraph [ref=e344]: Zions Bancorporation is comprised of a collection of extraordinary, locally led and community-focused banks serving businesses, households and local governments in some of the best growth markets in the nation. We’re determined to help build strong, successful communities, create economic opportunity and help our clients achieve greater financial strength through the relationships we develop and the services we provide.
                  - paragraph [ref=e345]
                  - paragraph [ref=e346]: "Zions Bancorporation, N.A. is one of the nation's premier financial services companies with approximately $89 billion of total assets at December 31, 2024, and annual net revenue of $3.1 billion in 2024. Zions operates under local management teams and distinct brands in 11 western states: Arizona, California, Colorado, Idaho, Nevada, New Mexico, Oregon, Texas, Utah, Washington and Wyoming. The bank is a national leader in Small Business Administration lending and public finance advisory services, and has been recognized by Coalition Greenwich with 233 Excellence awards for small business and middle market banking over the past 15 years."
