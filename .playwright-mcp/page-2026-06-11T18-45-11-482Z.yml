                - heading [level=2] [ref=e1979]: About the job
                - paragraph [ref=e688]:
                  - text: "Yext (NYSE: YEXT) is the leading brand visibility platform, built for a world where discovery and engagement happen everywhere — across AI search, traditional search, social media, websites, and direct communications. Powered by over 2 billion trusted data points and a suite of integrated products, Yext provides brands the clarity, control, and confidence to perform across digital channels. From real-time insights to AI-driven recommendations and execution at scale, Yext turns a brand's digital presence into a competitive advantage, which is only possible through our team of innovators and enthusiastic collaborators. Join us and experience firsthand why we are consistently recognized as a ‘Best Place to Work’ globally by industry leaders such as Built In, Fortune, and Great Place To Work®! The"
                  - emphasis [ref=e1116]: Systems & Networking team
                  - text: is responsible for designing and maintaining the foundational infrastructure that powers the entire Yext platform. Our core mission is to create reliable, predictable, and secure infrastructure within both our co-location facilities and cloud environments. We achieve this by integrating the best open-source and commercial technologies into an architecture that all Yext teams can leverage for developing, supporting, and maintaining the platform. Furthermore, we provide guidance to various teams on how to optimally utilize this infrastructure. What You'll Do
                  - list [ref=e1118]:
                    - listitem [ref=e1119]: Develop sophisticated systems that automate the building, testing, and operation of our infrastructure so that we can focus our attention on the things that matter.
                    - listitem [ref=e1120]: Work with talented software teams to optimize performance, and increase reliability of our applications, ensuring our infrastructure doesn’t skip a beat.
                    - listitem [ref=e1121]: Build comprehensive & secure self service functionalities that lets engineering teams move faster.
                    - listitem [ref=e1122]: Design and build our tools for monitoring and alerting to administer and comprehend increasing numbers of services.
                    - listitem [ref=e1123]: Define a set of standards that services should meet, and implement the capabilities to measure and score us on these.
                    - listitem [ref=e1124]: Diagnose and solve problems across the application, network, and infrastructure stacks in a predominantly Linux environment.
                  - text: What You’ll Have
                  - list [ref=e1126]:
                    - listitem [ref=e1127]: BA/BS in Computer Science, Engineering, or equivalent practical experience.
                    - listitem [ref=e1128]: 2–5 years of experience in a Site Reliability Engineering (SRE), Software Engineering (SWE), DevOps, Platform, or related role.
                    - listitem [ref=e1129]: Proven experience in designing, building, testing, monitoring, and automating secure distributed systems and networks.
                    - listitem [ref=e1130]: Possesses an automation-first mindset when developing and testing infrastructure.
                    - listitem [ref=e1131]: Strong interest in Platform Engineering, applying a customer and product-centric approach to building internal platforms.
                    - listitem [ref=e1132]: Enjoys knowledge sharing and thrives in a collaborative team environment.
                  - strong [ref=e1134]: Bonus Points
                  - list [ref=e1136]:
                    - listitem [ref=e1137]: Proficiency in programming languages such as Python, Go, Java, or similar.
                    - listitem [ref=e1138]: Working knowledge of major cloud platforms (AWS, GCP, or Azure).
                    - listitem [ref=e1139]: Experience with container orchestration using Kubernetes.
                    - listitem [ref=e1140]: Familiarity with Docker containers.
                    - listitem [ref=e1141]: Experience with Infrastructure as Code (IaC) tools (e.g., Ansible, Terraform, Terragrunt).
                    - listitem [ref=e1142]: Operations experience with the HashiStack (Nomad, Consul, Vault).
                    - listitem [ref=e1143]: Experience with Linux operating systems like RHEL/CentOS.
                    - listitem [ref=e1144]: Knowledge of version control systems (e.g., git, GitHub, Bitbucket).
                    - listitem [ref=e1145]: Basic understanding of networking concepts.
                  - text: "Pay ranges at Yext are established based on an analysis of salaries for positions with a similar level of accountability and impact in the relevant labor market. Salary levels are expected to change to reflect an employee’s job performance (results and impact) over time. Salaries at the time of hire are typically offered in the lower to middle of the above-referenced range in order to provide the opportunity to reflect performance-based increases over time. In addition to base salaries, employees at Yext are typically eligible for a comprehensive package of benefits including medical, dental and vision benefits; life insurance; short term and long-term disability; 401(k) retirement plan; and vacation and sick leave. Successful candidates may also be eligible for equity (stock) based compensation and/or variable pay programs based on performance relative to goals and targets. Annual Base Pay Range: $163,500 USD - $263,000 USD Yext is an equal opportunity employer committed to building a results-driven, engaging culture where every employee has the opportunity to contribute to the success of the Company, perform at the highest possible level, and grow their skills and capabilities. Yext welcomes employees and applicants of all backgrounds and demographics, and does not engage in discrimination on the basis of any protected characteristic recognized under applicable law. We also consider qualified applicants regardless of criminal histories, consistent with legal requirements. The Company believes a broad variety of life experiences across the Yext team is critical to its mission to help every business in the world be visible everywhere customers search. By seeking out fresh perspectives and fostering a positive interview experience and employee experience, Yext can remain at the forefront of innovation, and better serve its customers. It is Yext’s policy to provide reasonable accommodations to people with disabilities as required by applicable law. If you have a disability that requires an accommodation in completing this application, interviewing, or participating in the employee selection process, please complete"
