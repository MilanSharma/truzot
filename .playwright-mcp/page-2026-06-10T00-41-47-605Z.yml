                - text: .
            - generic [ref=e204]:
              - generic [ref=e205] [cursor=pointer]: How do I find a specific Instagram user by bio in IQFluence?
              - paragraph [ref=e208]: If you have a handle, paste it in and pull the profile + recent performance signals + audience basics. If you don’t, start with a niche query, then filter by location, language, follower range, engagement rate, and recency so you’re not approving “big numbers, dead audience.”
            - generic [ref=e209]:
              - generic [ref=e210] [cursor=pointer]: How to find someone’s Instagram bio?
              - paragraph [ref=e213]: "If you already know the handle, open their profile in IQFluence and you’ll see the bio text in the profile overview. If you don’t know the handle, use search Instagram by bio: type a niche phrase (like “UGC skincare” or “fitness coach”), then filter by location, language, and size to surface the right accounts—and open profiles to confirm the exact bio lines before you shortlist."
            - generic [ref=e214]:
              - generic [ref=e215] [cursor=pointer]: Can I search creators by what they wrote in their bio?
              - paragraph [ref=e218]: Yes — that’s exactly what Instagram bio search is for. Type the phrases your ideal creators use (job titles, niches, formats, creator “roles”), then filter down to the ones that match your market.
            - generic [ref=e219]:
              - generic [ref=e220] [cursor=pointer]: How do I search Instagram creators by niche?
              - paragraph [ref=e223]: Use search Instagram bios when you’re hunting creators by intent, not just aesthetics. Think “UGC creator,” “derm,” “budget travel,” “meal prep,” then refine by geo/language/size so your shortlist is actually sellable.
            - generic [ref=e224]:
              - generic [ref=e225] [cursor=pointer]: How do I exclude creators we already worked with?
              - paragraph [ref=e228]: Run a search, select past partners, add them to a blacklist, then apply that blacklist in your next search. That keeps results net-new, not “the same 20 accounts again.”
            - generic [ref=e229]:
              - generic [ref=e230] [cursor=pointer]: Can I find lookalike creators?
              - paragraph [ref=e233]: Yes. Drop in a creator you already like, enable Lookalikes, and IQFluence will surface similar formats, topic clusters, and audience patterns—so you scale what already worked.
            - generic [ref=e234]:
              - generic [ref=e235] [cursor=pointer]: Can I export results?
              - paragraph [ref=e238]: Yes — once your list is clean, export it as CSV for outreach, reporting, or media planning.
            - generic [ref=e239]:
              - generic [ref=e240] [cursor=pointer]: Can I filter by language and region?
              - paragraph [ref=e243]: Absolutely. Filter by location + language so you’re not paying for audiences in markets you can’t ship to, support, or legally target.
            - generic [ref=e244]:
              - generic [ref=e245] [cursor=pointer]: How do I find smaller creators (nano/micro)?
              - paragraph [ref=e248]: Use search Instagram bio to pull niche-relevant accounts, then filter to smaller follower ranges and validate with steady recent engagement. That’s how you avoid “small account, inflated vanity stats.”
            - generic [ref=e249]:
              - generic [ref=e250] [cursor=pointer]: Do you provide emails for every Instagram account?
              - paragraph [ref=e253]: No — Instagram doesn’t provide a universal email directory, and many creators don’t publish one. IQFluence helps you shortlist, then use whatever contact paths they do share in bio (email, link-in-bio, management, etc.)
