          - generic [ref=e197]:
            - generic [ref=e198]:
              - generic [ref=e199] [cursor=pointer]: Is IQFluence’s Instagram bio search search free?
              - paragraph [ref=e202]:
                - text: Yes. You can use it for free, but searches are capped. If you need deeper vetting (more results, more digging), unlock it with a
                - link "7-day free trial" [ref=e203] [cursor=pointer]:
