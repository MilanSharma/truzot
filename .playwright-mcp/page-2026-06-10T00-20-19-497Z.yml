                - link "Interviewers comment all the time on what candidates wear to their interviews...especially video interviews. On one hand they will remark at how great it was to see the candidate in a blazer, clearly taking this interview seriously. On the other hand, interviewers sometimes cannot get past the fact that, even if it's for a job in technology or a more casual job, such as not an executive role, it's still seen as not caring and lacking professionalism. We can sit here and say how annoying it is that we are being judged by our appearances, but everyone is judging your appearance in all situations, that’s the trouble with working with humans. I say when in doubt, wear a shirt with buttons on a video call. Maybe a blazer if it makes sense, but skip the tie. PS- If you want some insight on why you get interviews but not offers, I linked a free assessment in my bio. Clip" [ref=e336] [cursor=pointer]:
