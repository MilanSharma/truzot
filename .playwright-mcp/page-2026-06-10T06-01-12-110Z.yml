            - generic [ref=e240]:
              - generic [ref=e242]: I was frustrated because I knew I was qualified and capable for the jobs I was going for but I wasn’t landing interviews. I joined [Standout Job Search Coaching Program] to land a job I really wanted. The coaching on my LinkedIn profile ended up being huge for me, and was the source of half of the opportunities that came inbound to me without me having to apply, it was just recruiters reaching out to me. I also used Job Shopping strategies to de-risk my candidacy and get the companies to see my value before day 1 on the job. I landed the exact role I was targeting and negotiated a salary higher than the range with the help of the coaches. The return on investment has far exceeded what I expected and I am now set up financially to do things I’ve wanted to for a long time.
