  - region "Our story" [ref=e137]:
    - generic [ref=e139]:
      - generic [ref=e140]:
        - heading "Our story" [level=2] [ref=e141]
        - paragraph [ref=e142]: "BL🌸SSOM began with a simple question: what if job platforms prioritized the seeker's time? We built a system that targets roles precisely, writes stronger resumes, and leverages community to unlock referrals."
      - list "Company timeline" [ref=e144]:
        - listitem [ref=e145]:
          - heading "2020 — The Spark" [level=3] [ref=e147]
          - paragraph [ref=e148]: It all started with frustration. Job seekers were spending endless hours searching, only to find mismatched roles that didn't align with their experience or goals. We set out to change that.
        - listitem [ref=e149]:
          - heading "2021 — The Movement Begins" [level=3] [ref=e151]
          - paragraph [ref=e152]: We went live — sharing real-time job search strategies and personalized resume tips across Facebook and Instagram. A growing community began to form, united by the pursuit of smarter job searches.
        - listitem [ref=e153]:
          - heading "2022–2024 — Growth & Learning" [level=3] [ref=e155]
          - paragraph [ref=e156]: We launched both live and self-paced masterclasses, helping thousands of HIM and medical coding professionals take control of their career journeys. Every class, every story, shaped what came next.
        - listitem [ref=e157]:
          - heading "Early 2025 — Innovation in Motion" [level=3] [ref=e159]
          - paragraph [ref=e160]: Generic job boards weren't cutting it for HIM professionals. So we built our first targeting prototype — a system designed to match seekers with roles that truly fit their specialty.
        - listitem [ref=e161]:
          - heading "2025 — The Product Suite" [level=3] [ref=e163]
          - paragraph [ref=e164]: "Our vision evolved into a full toolkit: 137 HIM resume templates, AI-powered bullet builders, ATS resume scoring, salary simulator, and the Alignment Power Grid — all built to make every job search faster, sharper, and more strategic."
        - listitem [ref=e165]:
          - heading "Today — Community First" [level=3] [ref=e167]
          - paragraph [ref=e168]: BL🌸SSOM has grown into more than a platform — it's a referral hub and learning network that connects HIM, medical coding, and revenue cycle professionals with mentors and opportunities.
