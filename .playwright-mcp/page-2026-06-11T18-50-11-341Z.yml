          - generic [ref=e2184]:
            - text: Why are you being asked to complete this form?
            - paragraph [ref=e2185]:
              - text: This question requests information subject to the Vietnam Era Veterans' Readjustment Assistance Act of 1974, as amended by the Jobs for Veterans Act of 2002,
              - link "38 U.S.C. 4212" [ref=e2186] [cursor=pointer]:
                - /url: https://www.gpo.gov/fdsys/pkg/USCODE-2015-title38/html/USCODE-2015-title38-partIII-chap42-sec4212.htm
              - text: "(VEVRAA), which requires Government contractors to take affirmative action to employ and advance in employment: (1) disabled veterans; (2) recently separated veterans; (3) active duty wartime or campaign badge veterans; and (4) Armed Forces service medal veterans. These classifications are defined as follows:"
            - list [ref=e2187]:
              - listitem [ref=e2188]:
                - text: "A \"disabled veteran\" is one of the following:"
                - list [ref=e2189]:
                  - listitem [ref=e2190]: A veteran of the U.S. military, ground, naval or air service who is entitled to compensation (or who but for the receipt of military retired pay would be entitled to compensation) under laws administered by the Secretary of Veterans Affairs.
                  - listitem [ref=e2191]: A person who was discharged or released from active duty because of a service-connected disability.
              - listitem [ref=e2192]: A "recently separated veteran" means any veteran during the three-year period beginning on the date of such veteran's discharge or release from active duty in the U.S. military, ground, naval, or air service.
              - listitem [ref=e2193]: An "active duty wartime or campaign badge veteran" means a veteran who served on active duty in the U.S. military, ground, naval or air service during a war, or in a campaign or expedition for which a campaign badge has been authorized under the laws administered by the Department of Defense.
              - listitem [ref=e2194]:
                - text: An "Armed forces service medal veteran" means a veteran who, while serving on active duty in the U.S. military, ground, naval or air service, participated in a United States military operation for which an Armed Forces service medal was awarded pursuant to
                - link "Executive Order 12985." [ref=e2195] [cursor=pointer]:
                  - /url: https://www.federalregister.gov/documents/1996/01/18/96-622/establishing-the-armed-forces-service-medal
            - paragraph [ref=e2196]: Protected veterans may have additional rights under USERRA-the Uniformed Services Employment and Reemployment Rights Act. In particular, if you were absent from employment in order to perform service in the uniformed service, you may be entitled to be reemployed by your employer in the position you would have obtained with reasonable certainty if not for the absence due to service. For more information, call the U.S. Department of Labor's Veterans Employment and Training Service (VETS), toll-free, at 1-866-4-USA-DOL.
            - paragraph [ref=e2197]: If you believe you belong to any of the categories of protected veterans listed above, please indicate by checking the appropriate box below. As a Government contractor subject to VEVRAA, we request this information in order to measure the effectiveness of the outreach and positive recruitment efforts we undertake pursuant to VEVRAA.
          - group "Veteran status" [ref=e2200]:
