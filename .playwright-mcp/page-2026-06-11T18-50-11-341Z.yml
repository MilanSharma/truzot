          - generic [ref=e2211]:
            - paragraph [ref=e2212]: Form CC-305 OMB Control Number 1250-0005 Expires 04/30/2026
            - paragraph [ref=e2213]:
              - strong [ref=e2214]: Why are you being asked to complete this form?
              - text: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years. Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor?s Office of Federal Contract Compliance Programs (OFCCP) website at
              - link "www.dol.gov/ofccp" [ref=e2215] [cursor=pointer]:
                - /url: https://www.dol.gov/agencies/ofccp
              - text: .
            - paragraph [ref=e2216]:
              - strong [ref=e2217]: How do you know if you have a disability?
              - text: A disability is a condition that substantially limits one or more of your "major life activities." If you have or have ever had such a condition, you are a person with a disability.
              - strong [ref=e2218]: "Disabilities include, but are not limited to:"
            - list [ref=e2219]:
              - listitem [ref=e2220]: Alcohol or other substance use disorder (not currently using drugs illegally)
              - listitem [ref=e2221]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
              - listitem [ref=e2222]: Blind or low vision
              - listitem [ref=e2223]: Cancer (past or present)
              - listitem [ref=e2224]: Cardiovascular or heart disease
              - listitem [ref=e2225]: Celiac disease
              - listitem [ref=e2226]: Cerebral palsy
              - listitem [ref=e2227]: Deaf or serious difficulty hearing
              - listitem [ref=e2228]: Diabetes
              - listitem [ref=e2229]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
              - listitem [ref=e2230]: Epilepsy or other seizure disorder
              - listitem [ref=e2231]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
              - listitem [ref=e2232]: Intellectual or developmental disability
              - listitem [ref=e2233]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
              - listitem [ref=e2234]: Missing limbs or partially missing limbs
              - listitem [ref=e2235]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
              - listitem [ref=e2236]: Nervous system condition, for example, migraine headaches, Parkinson?s disease, multiple sclerosis (MS)
              - listitem [ref=e2237]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
              - listitem [ref=e2238]: Partial or complete paralysis (any cause)
              - listitem [ref=e2239]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
              - listitem [ref=e2240]: Short stature (dwarfism)
              - listitem [ref=e2241]: Traumatic brain injury
            - paragraph [ref=e2242]: "Please check one of the boxes below:"
